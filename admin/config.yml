backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "productos"
    label: "Productos"
    label_singular: "Producto"
    files:
      - name: "catalogo"
        label: "Catálogo de sandalias"
        file: "data/productos.json"
        fields:
          - label: "Productos"
            name: "productos"
            widget: "list"
            label_singular: "Producto"
            fields:
              - { label: "ID", name: "id", widget: "number", value_type: "int" }
              - { label: "Nombre", name: "nombre", widget: "string" }
              - { label: "Categoría", name: "categoria", widget: "select", options: ["Plana", "Plataforma", "Tacón", "Trenzada"] }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - { label: "Precio (COP)", name: "precio", widget: "number", value_type: "int" }
              - label: "Fotos"
                name: "imagenes"
                widget: "list"
                label_singular: "Foto"
                required: false
                field: { label: "Foto", name: "imagen", widget: "image", choose_url: false }
